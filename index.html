<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Showcase Pages</title>
  <meta name="description" content="Public showcase site for polished pages and presentations." />
  <style>
    :root {
      --bg: #0f1115;
      --card: rgba(255,255,255,.06);
      --line: rgba(255,255,255,.08);
      --text: #f5f7fb;
      --muted: #a9b1bd;
      --brand: #8ab4ff;
      --brand2: #b388ff;
      --max: 1100px;
      --radius: 24px;
      --shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Noto Sans SC", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(138,180,255,.14), transparent 30%),
        radial-gradient(circle at top right, rgba(179,136,255,.12), transparent 25%),
        linear-gradient(180deg, #0f1115 0%, #151922 100%);
      line-height: 1.7;
    }
    a { color: inherit; text-decoration: none; }
    .wrap { max-width: var(--max); margin: 0 auto; padding: 28px 20px 80px; }
    .hero, .card {
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 28px;
      backdrop-filter: blur(14px);
    }
    .hero { padding: 42px 30px; }
    .eyebrow {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(138,180,255,.12);
      color: var(--brand);
      font-size: 14px;
      font-weight: 700;
    }
    h1 { margin: 16px 0 12px; font-size: clamp(34px, 6vw, 64px); line-height: 1.05; letter-spacing: -0.04em; }
    .sub { color: var(--muted); max-width: 760px; font-size: 17px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; margin-top: 24px; }
    .card { padding: 22px; }
    .card h2 { margin: 10px 0 8px; font-size: 24px; }
    .muted { color: var(--muted); }
    .meta { margin-top: 14px; color: var(--muted); font-size: 14px; }
    .btn { display: inline-flex; margin-top: 18px; padding: 11px 15px; border-radius: 999px; background: linear-gradient(135deg, var(--brand), var(--brand2)); color: white; font-weight: 700; }
    .badge { display:inline-block; padding:6px 10px; border-radius:999px; background: rgba(138,180,255,.12); color: var(--brand); font-size: 12px; font-weight: 700; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">Public Showcase</div>
      <h1>Showcase Pages</h1>
      <p class="sub">用于承载从私有工作仓库精炼后发布出来的公开展示页面。适合旅行计划、方案页、汇报页、提案页等后续持续扩展。</p>
    </section>
    <section class="grid">
      
      <a class="card" href="./trips/hk-macau-apr-2026/">
        <div class="badge">Trips</div>
        <h2>Hong Kong &amp; Macau Couple Trip · Apr 2026</h2>
        <p class="muted">4天3晚，澳门一日、港迪一日、拍照、买包、咖啡、港餐的精致执行版页面。</p>
        <div class="meta">路径：/trips/hk-macau-apr-2026/ · 更新：2026-03-07</div>
        <span class="btn">打开页面</span>
      </a>
    </section>
  </div>
</body>
</html>
